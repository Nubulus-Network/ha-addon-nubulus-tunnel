name: "Nubulus Tunnel"
description: "Expose your Home Assistant to the internet via Nubulus Network tunnels — no open ports, no public IP required."
version: "1.0.3"
slug: "nubulus-tunnel"
arch:
  - amd64
  - aarch64
  - armv7
url: "https://nubulusnetwork.es"
startup: application
boot: auto
init: false
host_network: false

options:
  tunnel_token: ""
  log_level: "info"

schema:
  tunnel_token: str
  log_level: list(debug|info|warn|error)
